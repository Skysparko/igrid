# Production stack — all services start together:
#   pnpm docker:prod
#   docker compose -f docker-compose.prod.yml up -d --build
#
# S3: MinIO runs in-cluster. Set matching credentials in .env.api (S3_* vars).
# The API overrides S3_ENDPOINT to http://minio:9000 for container networking.
services:
  ollama:
    image: ollama/ollama:latest
    container_name: mentingo-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    # GPU support for NVIDIA GPU (126GB VRAM)
    # To enable GPU: Uncomment the 'deploy' section below and install NVIDIA Container Toolkit
    # To disable GPU: Keep 'deploy' section commented (will run in CPU mode, slower)
    # Install NVIDIA Container Toolkit: See GPU-SETUP.md or run scripts/install-nvidia-container-toolkit.sh
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Optional environment variables (uncomment if needed):
    # environment:
    #   # Set CUDA_VISIBLE_DEVICES if you have multiple GPUs
    #   CUDA_VISIBLE_DEVICES: "0"
    #   # Set OLLAMA_NUM_GPU to use multiple GPUs
    #   OLLAMA_NUM_GPU: "1"
    # With 126GB VRAM, you can run larger models or multiple models
    # Consider using larger models like llama3:70b or multiple instances
    healthcheck:
      disable: true

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    image: mentingo-api
    container_name: mentingo-api
    restart: unless-stopped
    env_file: .env.api
    environment:
      # Override host-local S3 endpoint when API runs inside Docker
      S3_ENDPOINT: http://minio:9000
    command: server
    ports:
      - "3001:3000"
    depends_on:
      ollama:
        condition: service_started
      db:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      create-minio-bucket:
        condition: service_completed_successfully
    # OLLAMA_BASE_URL should be set to http://ollama:11434/api in .env.api
    # This uses Docker's internal networking (service name)

  db:
    image: pgvector/pgvector:pg16
    container_name: mentingo-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: guidebook
      POSTGRES_DB: guidebook
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: mentingo-redis
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: mentingo-minio
    restart: unless-stopped
    ports:
      - "9100:9000" # S3 API (optional; for external tools / debugging)
      - "9101:9001" # Web console
    environment:
      # Must match S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY / S3_BUCKET_NAME in .env.api
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKETS: my-local-bucket
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  create-minio-bucket:
    image: quay.io/minio/mc:latest
    container_name: mentingo-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    env_file: .env.api
    volumes:
      - ./create-minio-bucket.sh:/create-minio-bucket.sh
    entrypoint: ["/bin/sh", "/create-minio-bucket.sh"]

  ui:
    build:
      context: .
      dockerfile: web.Dockerfile
      args:
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_GOOGLE_OAUTH_ENABLED: ${VITE_GOOGLE_OAUTH_ENABLED}
        VITE_MICROSOFT_OAUTH_ENABLED: ${VITE_MICROSOFT_OAUTH_ENABLED}
        VITE_SLACK_OAUTH_ENABLED: ${VITE_SLACK_OAUTH_ENABLED}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST}
        VITE_CONTENTFUL_SPACE_ID: ${VITE_CONTENTFUL_SPACE_ID}
        VITE_CONTENTFUL_ACCESS_TOKEN: ${VITE_CONTENTFUL_ACCESS_TOKEN}
        VITE_CONTENTFUL_ENVIRONMENT: ${VITE_CONTENTFUL_ENVIRONMENT:-master}
    image: mentingo-ui
    container_name: mentingo-ui
    restart: unless-stopped
    env_file: .env.ui
    ports:
      - "7001:8080"

volumes:
  db-data:
  ollama-data:
    driver: local
  minio-data:
    driver: local
